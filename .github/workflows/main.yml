name: Extrator RePEc

on:
  workflow_dispatch: # Isso cria um botão para você rodar o script manualmente

jobs:
  rodar-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Garante que o robô pode salvar arquivos no repo

    steps:
      - name: Baixar arquivos do repositório
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar bibliotecas necessárias
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas openpyxl

      - name: Executar o script
        # Substitua o nome abaixo se o seu arquivo Python tiver um nome diferente
        run: python Script_Extracao_RePEc.py

      - name: Salvar os resultados gerados de volta no repositório
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Extrator"
          git add Dados_Completos_RePEc.xlsx Lista_Handles_RePEc.csv
          # O "|| echo" evita erro se por acaso os arquivos não mudarem entre uma execução e outra
          git commit -m "Atualizando base de dados do RePEc" || echo "Sem alterações novas para salvar."
          git push
